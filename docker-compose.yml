services:
  redis:
    image: redis:7-alpine
    container_name: jobmatch-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
    container_name: jobmatch-backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: http://localhost:3000
      REDIS_URL: redis://redis:6379
      ENABLE_GEMINI_AI: "false"
    ports:
      - "5000:5000"
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:5000
    container_name: jobmatch-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  redis-data:
